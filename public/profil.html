<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - Donează Sânge</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <header class="app-header">
    <a class="brand" href="/">Donează<br>Sânge</a>
    <nav class="header-auth" style="display:none">
      <a href="/" class="nav-link">Cereri</a>
      <a href="/prieteni.html" class="nav-link">Prieteni</a>
      <a href="/profil.html" class="nav-link active">Profil</a>
    </nav>
    <div class="header-right">
      <button class="bell header-auth" id="bell-btn" style="display:none"><svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg><span class="bell-count" id="bell-count" hidden>0</span></button>
      <button class="btn-link header-auth" id="logout-btn" style="display:none">Ieși</button>
    </div>
    <div class="notifications-panel" id="notifications-panel" hidden>
      <h3>Notificări</h3>
      <div id="notifications-list"></div>
    </div>
  </header>

  <main class="page">

    <section class="profile-hero" id="profile-hero">
      <p>Se încarcă...</p>
    </section>

    <section class="active-pledges" id="active-pledges-section" hidden>
      <h2>Donații programate</h2>
      <div id="active-pledges-list"></div>
    </section>

    <section class="donation-history">
      <h2>Istoricul donațiilor</h2>
      <div id="history-list">Se încarcă...</div>
    </section>

  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/profil.js"></script>
</body>
</html>
