# =============================================================
# Config Nginx pentru Donează Sânge (server local + DuckDNS)
# -------------------------------------------------------------
# Copiază acest fișier pe server în /etc/nginx/sites-available/
# și creează un symlink în /etc/nginx/sites-enabled/.
#
# Apoi:
#   sudo nginx -t              # verifică sintaxa
#   sudo systemctl reload nginx
#
# Înlocuiește "doneaza-sange.duckdns.org" cu subdomeniul tău
# DuckDNS real.
#
# Pași opționali pentru HTTPS (recomandat):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d doneaza-sange.duckdns.org
# Certbot va completa automat blocurile SSL în acest fișier.
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name doneaza-sange.duckdns.org;

    # Limită rezonabilă pentru request body (în caz de uploads viitoare)
    client_max_body_size 1m;

    # ---------- Endpoint pentru Socket.io ----------
    # Aici e cheia: Socket.io începe cu un POST HTTP, apoi face
    # upgrade la WebSocket. Trebuie să forward-uim header-ele de
    # upgrade ca să meargă notificările live (clopoțelul + pledge-uri).
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout mare pentru long-polling fallback al Socket.io
        proxy_read_timeout 86400;
    }

    # ---------- Restul aplicației (HTML, API, statice) ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
